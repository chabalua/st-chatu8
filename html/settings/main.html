<div id="ch-tab-main">
    <!-- Language selector -->
    <div class="st-chatu8-settings-section">
        <div class="st-chatu8-field">
            <label data-i18n="language_label">语言</label>
            <select id="chatu8-lang-select" class="st-chatu8-select chatu8-lang-select"
                    onchange="window.chatu8_i18n && window.chatu8_i18n.setLanguage(this.value)">
                <option value="zh">中文</option>
                <option value="vi">Tiếng Việt</option>
            </select>
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="main_section_title">主要设置</h3>
        <div class="st-chatu8-field">
            <label for="scriptEnabled" data-i18n="main_label_enabled">启用插件</label>
            <div class="st-chatu8-toggle">
                <input id="scriptEnabled" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="mode" data-i18n="main_label_mode">模式</label>
            <select id="mode" class="st-chatu8-select">
                <option value="sd">SD</option>
                <option value="novelai">NovelAI</option>
                <option value="comfyui">ComfyUI</option>
                <option value="banana">Banana/Grok</option>
            </select>
        </div>
        <div class="st-chatu8-field">
            <label for="client" data-i18n="main_label_client">客户端</label>
            <select id="client" class="st-chatu8-select">
                <option value="browser" data-i18n="main_client_browser">浏览器</option>
                <option value="jiuguan" data-i18n="main_client_tavern">酒馆</option>
            </select>
        </div>
        <div class="st-chatu8-field">
            <label for="dbclike" data-i18n="main_label_dbclick">隐藏按钮（双击图片触发）</label>
            <div class="st-chatu8-toggle">
                <input id="dbclike" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="collapseImage" data-i18n="main_label_collapse_image">折叠图片</label>
            <div class="st-chatu8-toggle">
                <input id="collapseImage" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="zidongdianji" data-i18n="main_label_auto_click">自动点击生成</label>
            <div class="st-chatu8-toggle">
                <input id="zidongdianji" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="zidongdianji2" data-i18n="main_label_auto_click2">自动点击(没事别开)</label>
            <div class="st-chatu8-toggle">
                <input id="zidongdianji2" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="longPressToEdit" data-i18n="main_label_long_press">长按图片修改tag</label>
            <div class="st-chatu8-toggle">
                <input id="longPressToEdit" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="clickToPreview" data-i18n="main_label_click_preview">单击图片预览</label>
            <div class="st-chatu8-toggle">
                <input id="clickToPreview" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="newlineFixEnabled" data-i18n="main_label_newline_fix">换行修复</label>
            <div class="st-chatu8-toggle">
                <input id="newlineFixEnabled" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="enablePregen" data-i18n="main_label_pregen">启用流式预生成</label>
            <div class="st-chatu8-toggle">
                <input id="enablePregen" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="autoLLMImageGen" data-i18n="main_label_auto_llm">自动LLM请求生图(非同层)</label>
            <div class="st-chatu8-toggle">
                <input id="autoLLMImageGen" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="imageGenInterval" data-i18n="main_label_interval">生图间隔时间（毫秒）</label>
            <input type="number" id="imageGenInterval" class="st-chatu8-text-input" min="0" step="100" placeholder="0">
        </div>

        <div class="st-chatu8-field">
            <label for="imageAlignment" data-i18n="main_label_alignment">图片对齐方式</label>
            <select id="imageAlignment" class="st-chatu8-select">
                <option value="left" data-i18n="main_align_left">靠左</option>
                <option value="center" data-i18n="main_align_center">居中</option>
                <option value="right" data-i18n="main_align_right">靠右</option>
            </select>
        </div>
        <div class="st-chatu8-field">
            <label for="imageSizeScale" data-i18n="main_label_size">图片显示大小</label>
            <select id="imageSizeScale" class="st-chatu8-select">
                <option value="100" data-i18n="main_size_100">自适应（100%）</option>
                <option value="75" data-i18n="main_size_75">3/4 大小（75%）</option>
                <option value="50" data-i18n="main_size_50">1/2 大小（50%）</option>
                <option value="25" data-i18n="main_size_25">1/4 大小（25%）</option>
            </select>
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="markers_section_title">标记</h3>
        <div class="st-chatu8-field">
            <label for="startTag" data-i18n="markers_label_start">开始标记</label>
            <input type="text" id="startTag" class="st-chatu8-text-input">
        </div>
        <div class="st-chatu8-field">
            <label for="endTag" data-i18n="markers_label_end">结束标记</label>
            <input type="text" id="endTag" class="st-chatu8-text-input">
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="tag_storage_section_title">储存tag模式</h3>
        <div class="st-chatu8-field">
            <label for="insertOriginalText" data-i18n="tag_storage_label_insert">插入原文(非同层)</label>
            <div class="st-chatu8-toggle">
                <input id="insertOriginalText" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="cache_section_title">缓存管理(点击下方按钮清除)</h3>
        <div class="st-chatu8-field">
            <label for="cache" data-i18n="cache_label_select">需要清除的缓存</label>
            <select id="cache" class="st-chatu8-select">
                <option value="0" data-i18n="cache_option_0">不再缓存</option>
                <option value="1" data-i18n="cache_option_1">点击清除一天前的</option>
                <option value="7" data-i18n="cache_option_7">点击清除一星期前的</option>
                <option value="30" data-i18n="cache_option_30">点击清除一个月前的</option>
                <option value="365" data-i18n="cache_option_365">点击清除一年前的</option>
            </select>
        </div>
        <div class="st-chatu8-field">
            <label for="jiuguanchucun" data-i18n="cache_label_tavern">缓存图片到酒馆</label>
            <div class="st-chatu8-toggle">
                <input id="jiuguanchucun" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="convertToJpegStorage" data-i18n="cache_label_jpeg">转JPEG储存节省70%空间(噪点明显增加)</label>
            <div class="st-chatu8-toggle">
                <input id="convertToJpegStorage" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label data-i18n="cache_label_ops">操作</label>
            <div>
                <button id="sync-server-images-btn" class="st-chatu8-btn" data-i18n="cache_btn_sync">同步服务器图片</button>
                <button id="Clear-Cache" class="st-chatu8-btn danger" data-i18n="cache_btn_clear">清除图片缓存</button>
                <button id="migrate-database-btn" class="st-chatu8-btn" data-i18n="cache_btn_migrate">数据迁移</button>
            </div>
        </div>
    </div>
</div>
