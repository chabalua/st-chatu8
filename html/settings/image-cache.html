<div id="ch-tab-image-cache">
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_image_cache_mgmt">图片缓存管理</h3>
        <div class="st-chatu8-cache-controls">
            <button id="image-cache-toggle-multiselect" class="st-chatu8-btn"><span data-i18n="btn_cache_multiselect">多选</span></button>
            <button id="image-cache-select-all" class="st-chatu8-btn"><span data-i18n="btn_cache_select_all">全选</span></button>
            <button id="image-cache-deselect-all" class="st-chatu8-btn"><span data-i18n="btn_cache_deselect_all">取消全选</span></button>
            <button id="image-cache-download-selected" class="st-chatu8-btn"><i class="fa-solid fa-download"></i> <span data-i18n="btn_cache_download_selected">下载选中</span></button>
            <button id="image-cache-delete-selected" class="st-chatu8-btn danger"><i class="fa-solid fa-trash"></i> <span data-i18n="btn_cache_delete_selected">删除选中</span></button>
        </div>
        <div id="image-cache-grid" class="st-chatu8-image-cache-grid">
            <!-- Images will be loaded here -->
        </div>
        <div id="image-cache-pagination" class="st-chatu8-pagination">
            <!-- Pagination controls will be here -->
            <div class="st-chatu8-field" id="image-cache-jump-container" style="display: none; margin-left: 10px;">
                <label for="image-cache-jump-input" data-i18n="label_cache_jump_to">跳转到</label>
                <div class="st-chatu8-input-group">
                    <input type="number" id="image-cache-jump-input" class="st-chatu8-page-jump-input" data-i18n-placeholder="placeholder_cache_page" placeholder="页码" min="1">
                    <button id="image-cache-jump-button" class="st-chatu8-btn"><span data-i18n="btn_cache_jump">跳转</span></button>
                </div>
            </div>
        </div>
        <div id="image-cache-info" class="st-chatu8-cache-info"></div>
    </div>
</div>
