<div id="st-chatu8-tab-banana" class="st-chatu8-settings-banana">
    <!-- 1. 基础设置 -->
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_banana_basic">基础设置</h3>
        <div class="st-chatu8-field-col">
            <label for="st-chatu8-banana-api-url" data-i18n="label_banana_api_url">API 连接地址</label>
            <input type="text" id="st-chatu8-banana-api-url" class="st-chatu8-text-input" data-i18n-placeholder="placeholder_banana_api_url" placeholder="http://localhost:7860">
        </div>
        <div class="st-chatu8-field-col">
            <label for="st-chatu8-banana-api-key" data-i18n="label_banana_api_key">API Key</label>
            <input type="text" id="st-chatu8-banana-api-key" class="st-chatu8-text-input" data-i18n-placeholder="placeholder_banana_api_key" placeholder="在此输入您的 API Key">
        </div>
        <div class="st-chatu8-grid-2">
            <div class="st-chatu8-field">
                <label for="st-chatu8-banana-model-select" data-i18n="label_banana_image_model">图像模型选择</label>
                <div class="st-chatu8-profile-controls">
                    <select id="st-chatu8-banana-model-select" class="st-chatu8-select">
                        <option value="gemini-2.5-flash-image">gemini-2.5-flash-image</option>
                        <option value="imagen-4.0-generate-001">imagen-4.0-generate-001</option>
                        <option value="imagen-4.0-ultra-generate-001">imagen-4.0-ultra-generate-001</option>
                    </select>
                    <button class="st-chatu8-icon-btn" id="st-chatu8-banana-fetch-models" data-i18n-title="title_fetch_models" title="获取模型列表"><i class="fa-solid fa-rotate"></i></button>
                </div>
            </div>
            <div class="st-chatu8-field">
                <label for="st-chatu8-banana-video-model-select" data-i18n="label_banana_video_model">视频模型选择</label>
                <div class="st-chatu8-profile-controls">
                    <select id="st-chatu8-banana-video-model-select" class="st-chatu8-select">
                        <option value="gemini-2.5-flash-image">gemini-2.5-flash-image</option>
                        <option value="imagen-4.0-generate-001">imagen-4.0-generate-001</option>
                        <option value="imagen-4.0-ultra-generate-001">imagen-4.0-ultra-generate-001</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="st-chatu8-banana-aspect-ratio" data-i18n="label_banana_aspect_ratio">长宽比</label>
            <select id="st-chatu8-banana-aspect-ratio" class="st-chatu8-select">
                <option value="1:1">1:1</option>
                <option value="9:16">9:16</option>
                <option value="16:9">16:9</option>
                <option value="4:3">4:3</option>
                <option value="3:4">3:4</option>
            </select>
        </div>
        <div class="st-chatu8-grid-2">
            <div class="st-chatu8-field">
                <label for="st-chatu8-banana-edit-preset" data-i18n="label_banana_edit_preset">修图预设选择</label>
                <select id="st-chatu8-banana-edit-preset" class="st-chatu8-select"></select>
            </div>
            <div class="st-chatu8-field">
                <label for="st-chatu8-banana-video-preset" data-i18n="label_banana_video_preset">视频预设选择</label>
                <select id="st-chatu8-banana-video-preset" class="st-chatu8-select"></select>
            </div>
        </div>
    </div>

    <!-- 3. Banana 专属替换词设置 -->
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_banana_prompt_replace_rules">提示词替换规则</h3>
        <p class="st-chatu8-help-text" data-i18n="help_banana_prompt_replace">Banana/Grok 专属的替换词设置，独立于其他生图后端。格式：<code>触发词=模式|替换内容</code></p>
        <div class="st-chatu8-field">
            <label for="st-chatu8-banana-prompt-replace-id" data-i18n="label_banana_prompt_replace_preset">替换规则预设</label>
            <div class="st-chatu8-profile-controls">
                <select id="st-chatu8-banana-prompt-replace-id" class="st-chatu8-select"></select>
                <button class="st-chatu8-icon-btn" id="st-chatu8-banana-prompt-replace-save" data-i18n-title="title_save" title="保存"><i class="fa-solid fa-save"></i></button>
                <button class="st-chatu8-icon-btn" id="st-chatu8-banana-prompt-replace-save-as" data-i18n-title="title_save_as" title="另存为"><i class="fa-solid fa-file-export"></i></button>
                <button class="st-chatu8-icon-btn" id="st-chatu8-banana-prompt-replace-import" data-i18n-title="title_import" title="导入"><i class="fa-solid fa-download"></i></button>
                <button class="st-chatu8-icon-btn" id="st-chatu8-banana-prompt-replace-export" data-i18n-title="title_export_current" title="导出当前"><i class="fa-solid fa-upload"></i></button>
                <button class="st-chatu8-icon-btn danger" id="st-chatu8-banana-prompt-replace-delete" data-i18n-title="title_delete" title="删除"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
        <div class="st-chatu8-field-col">
            <label for="st-chatu8-banana-prompt-replace-text"><span data-i18n="label_banana_replace_content">替换规则内容</span> <span class="st-chatu8-unsaved-warning" style="display:none; color: #ff9800; font-size: 12px;"><i class="fa-solid fa-circle-exclamation"></i> <span data-i18n="label_unsaved_indicator">未保存</span></span></label>
            <textarea id="st-chatu8-banana-prompt-replace-text" class="st-chatu8-textarea" rows="6" data-i18n-placeholder="placeholder_banana_prompt_replace" placeholder="触发词1=前置前|插入词1&#10;触发词2=前置后|插入词2&#10;触发词3=替换|替换词3&#10;触发词4=后置前|插入词4&#10;触发词5=后置后|插入词5&#10;触发词6=最后置|插入词6"></textarea>
        </div>
        <div class="st-chatu8-banana-replace-help">
            <details>
                <summary><i class="fa-solid fa-circle-info"></i> <span data-i18n="banana_replace_summary_title">替换模式说明</span></summary>
                <div class="st-chatu8-help-content">
                    <ul>
                        <li><strong data-i18n="banana_mode_pre_pre">前置前</strong> - <span data-i18n="banana_mode_desc_pre_pre">在提示词最前面插入内容</span></li>
                        <li><strong data-i18n="banana_mode_pre_post">前置后</strong> - <span data-i18n="banana_mode_desc_pre_post">在前置固定词后插入内容</span></li>
                        <li><strong data-i18n="banana_mode_replace">替换</strong> - <span data-i18n="banana_mode_desc_replace">直接替换触发词（留空则删除）</span></li>
                        <li><strong data-i18n="banana_mode_replace_char">替换分角色</strong> - <span data-i18n="banana_mode_desc_replace_char">分角色模式下替换</span></li>
                        <li><strong data-i18n="banana_mode_post_pre">后置前</strong> - <span data-i18n="banana_mode_desc_post_pre">在后置固定词前插入内容</span></li>
                        <li><strong data-i18n="banana_mode_post_post">后置后</strong> - <span data-i18n="banana_mode_desc_post_post">在后置固定词后插入内容</span></li>
                        <li><strong data-i18n="banana_mode_last">最后置</strong> - <span data-i18n="banana_mode_desc_last">在提示词最后面插入内容</span></li>
                    </ul>
                </div>
            </details>
        </div>
    </div>

    <!-- 2. 多轮对话 -->
    <div id="st-chatu8-banana-multimodal-section" class="st-chatu8-settings-section">
        <h3 data-i18n="h_banana_multimodal">多轮对话 (Gemini)</h3>
        <div class="st-chatu8-field-col">
            <label for="st-chatu8-banana-fixed-prompt" data-i18n="label_banana_fixed_positive">固定正面提示词</label>
            <textarea id="st-chatu8-banana-fixed-prompt" class="st-chatu8-textarea" rows="2"></textarea>
        </div>
        <div class="st-chatu8-field-col">
            <label for="st-chatu8-banana-postfix-prompt" data-i18n="label_banana_postfix_positive">后置固定正面提示词</label>
            <textarea id="st-chatu8-banana-postfix-prompt" class="st-chatu8-textarea" rows="2"></textarea>
        </div>
        <div class="st-chatu8-field">
            <label for="st-chatu8-banana-conversation-preset-id" data-i18n="label_banana_conversation_preset">对话预设</label>
            <div class="st-chatu8-profile-controls">
                <select id="st-chatu8-banana-conversation-preset-id" class="st-chatu8-select"></select>
                <button class="st-chatu8-icon-btn" id="st-chatu8-banana-conversation-save" data-i18n-title="title_save" title="保存"><i class="fa-solid fa-save"></i></button>
                <button class="st-chatu8-icon-btn" id="st-chatu8-banana-conversation-save-as" data-i18n-title="title_save_as" title="另存为"><i class="fa-solid fa-file-export"></i></button>
                <button class="st-chatu8-icon-btn" id="st-chatu8-banana-conversation-import" data-i18n-title="title_import" title="导入"><i class="fa-solid fa-download"></i></button>
                <button class="st-chatu8-icon-btn" id="st-chatu8-banana-conversation-export" data-i18n-title="title_export" title="导出"><i class="fa-solid fa-upload"></i></button>
                <button class="st-chatu8-icon-btn danger" id="st-chatu8-banana-conversation-delete" data-i18n-title="title_delete" title="删除"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
        
        <div class="st-chatu8-banana-conversation-group">
            <h4 data-i18n="banana_round_1">第 1 轮</h4>
            <div class="st-chatu8-banana-conversation-turn">
                <div class="st-chatu8-banana-turn-user">
                    <h5>User</h5>
                    <textarea id="st-chatu8-banana-user-text-1" class="st-chatu8-textarea" rows="3" data-i18n-placeholder="placeholder_user_text" placeholder="用户文本..."></textarea>
                    <div class="st-chatu8-image-preview-container small" id="st-chatu8-banana-user-image-container-1">
                        <img id="st-chatu8-banana-user-image-1" src="" style="display:none;">
                        <div class="st-chatu8-image-placeholder"><i class="fa-solid fa-image"></i></div>
                        <button class="st-chatu8-icon-btn danger top-right" id="st-chatu8-banana-user-image-remove-1" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                        <input type="file" id="st-chatu8-banana-user-image-input-1" accept="image/*" style="display:none;">
                    </div>
                </div>
                <div class="st-chatu8-banana-turn-model">
                    <h5>Model</h5>
                    <textarea id="st-chatu8-banana-model-text-1" class="st-chatu8-textarea" rows="3" data-i18n-placeholder="placeholder_model_text" placeholder="模型文本..."></textarea>
                    <div class="st-chatu8-image-preview-container small" id="st-chatu8-banana-model-image-container-1">
                        <img id="st-chatu8-banana-model-image-1" src="" style="display:none;">
                        <div class="st-chatu8-image-placeholder"><i class="fa-solid fa-image"></i></div>
                        <button class="st-chatu8-icon-btn danger top-right" id="st-chatu8-banana-model-image-remove-1" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                        <input type="file" id="st-chatu8-banana-model-image-input-1" accept="image/*" style="display:none;">
                    </div>
                </div>
            </div>
        </div>
        <div class="st-chatu8-banana-conversation-group">
            <h4 data-i18n="banana_round_2">第 2 轮</h4>
            <div class="st-chatu8-banana-conversation-turn">
                <div class="st-chatu8-banana-turn-user">
                    <h5>User</h5>
                    <textarea id="st-chatu8-banana-user-text-2" class="st-chatu8-textarea" rows="3" data-i18n-placeholder="placeholder_user_text" placeholder="用户文本..."></textarea>
                    <div class="st-chatu8-image-preview-container small" id="st-chatu8-banana-user-image-container-2">
                        <img id="st-chatu8-banana-user-image-2" src="" style="display:none;">
                        <div class="st-chatu8-image-placeholder"><i class="fa-solid fa-image"></i></div>
                        <button class="st-chatu8-icon-btn danger top-right" id="st-chatu8-banana-user-image-remove-2" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                        <input type="file" id="st-chatu8-banana-user-image-input-2" accept="image/*" style="display:none;">
                    </div>
                </div>
                <div class="st-chatu8-banana-turn-model">
                    <h5>Model</h5>
                    <textarea id="st-chatu8-banana-model-text-2" class="st-chatu8-textarea" rows="3" data-i18n-placeholder="placeholder_model_text" placeholder="模型文本..."></textarea>
                    <div class="st-chatu8-image-preview-container small" id="st-chatu8-banana-model-image-container-2">
                        <img id="st-chatu8-banana-model-image-2" src="" style="display:none;">
                        <div class="st-chatu8-image-placeholder"><i class="fa-solid fa-image"></i></div>
                        <button class="st-chatu8-icon-btn danger top-right" id="st-chatu8-banana-model-image-remove-2" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                        <input type="file" id="st-chatu8-banana-model-image-input-2" accept="image/*" style="display:none;">
                    </div>
                </div>
            </div>
        </div>
        <div class="st-chatu8-banana-conversation-group">
            <h4 data-i18n="banana_round_3">第 3 轮</h4>
            <div class="st-chatu8-banana-conversation-turn">
                <div class="st-chatu8-banana-turn-user">
                    <h5>User</h5>
                    <textarea id="st-chatu8-banana-user-text-3" class="st-chatu8-textarea" rows="3" data-i18n-placeholder="placeholder_user_text" placeholder="用户文本..."></textarea>
                    <div class="st-chatu8-image-preview-container small" id="st-chatu8-banana-user-image-container-3">
                        <img id="st-chatu8-banana-user-image-3" src="" style="display:none;">
                        <div class="st-chatu8-image-placeholder"><i class="fa-solid fa-image"></i></div>
                        <button class="st-chatu8-icon-btn danger top-right" id="st-chatu8-banana-user-image-remove-3" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                        <input type="file" id="st-chatu8-banana-user-image-input-3" accept="image/*" style="display:none;">
                    </div>
                </div>
                <div class="st-chatu8-banana-turn-model">
                    <h5>Model</h5>
                    <textarea id="st-chatu8-banana-model-text-3" class="st-chatu8-textarea" rows="3" data-i18n-placeholder="placeholder_model_text" placeholder="模型文本..."></textarea>
                    <div class="st-chatu8-image-preview-container small" id="st-chatu8-banana-model-image-container-3">
                        <img id="st-chatu8-banana-model-image-3" src="" style="display:none;">
                        <div class="st-chatu8-image-placeholder"><i class="fa-solid fa-image"></i></div>
                        <button class="st-chatu8-icon-btn danger top-right" id="st-chatu8-banana-model-image-remove-3" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                        <input type="file" id="st-chatu8-banana-model-image-input-3" accept="image/*" style="display:none;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
