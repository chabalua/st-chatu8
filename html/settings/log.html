<div id="ch-tab-log">
    <!-- 生图生涯 -->
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_gen_career">🎨 生图生涯</h3>

        <!-- 汇总卡片 -->
        <div id="ch-gen-summary" style="margin-bottom: 10px;">
            <span style="color: #888;" data-i18n="log_loading">加载中...</span>
        </div>

        <!-- 图例 -->
        <div id="ch-gen-legend" style="margin-bottom: 6px;"></div>

        <!-- 时间维度切换 -->
        <div style="display: flex; gap: 4px; margin-bottom: 6px;">
            <button class="ch-period-btn" data-period="day"
                style="padding: 3px 10px; font-size: 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; background: rgba(255,255,255,0.06); color: #aaa;"><span data-i18n="period_day">日</span></button>
            <button class="ch-period-btn" data-period="week"
                style="padding: 3px 10px; font-size: 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; background: rgba(255,255,255,0.06); color: #aaa;"><span data-i18n="period_week">周</span></button>
            <button class="ch-period-btn" data-period="month"
                style="padding: 3px 10px; font-size: 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; background: rgba(255,255,255,0.06); color: #aaa;"><span data-i18n="period_month">月</span></button>
            <button class="ch-period-btn" data-period="year"
                style="padding: 3px 10px; font-size: 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; background: rgba(255,255,255,0.06); color: #aaa;"><span data-i18n="period_year">年</span></button>
        </div>

        <!-- 柱状图区域 -->
        <div id="ch-gen-chart" style="min-height: 110px; margin-bottom: 10px;">
            <div style="text-align:center; color:#888; padding:20px 0;" data-i18n="log_loading">加载中...</div>
        </div>

        <!-- 按后端进度条 -->
        <div id="ch-gen-backends" style="margin-bottom: 8px;"></div>

        <!-- 操作按钮 -->
        <div class="st-chatu8-field" style="margin-top: 4px;">
            <label data-i18n="label_log_ops">操作</label>
            <div>
                <button id="ch-refresh-gen-stats" class="st-chatu8-btn"><span data-i18n="btn_refresh_stats">刷新统计</span></button>
                <button id="ch-reset-gen-stats" class="st-chatu8-btn danger"><span data-i18n="btn_reset_stats">重置统计</span></button>
            </div>
        </div>
        <div class="st-chatu8-field-col" style="font-size: 12px; color: #888;">
            <span data-i18n="help_gen_log">💡 每次生图成功自动记录，永久保存，按 日/周/月/年 查看趋势。</span>
        </div>
    </div>

    <!-- 调试模式 -->
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_debug_mode">🔧 调试模式</h3>
        <div class="st-chatu8-field">
            <label data-i18n="label_debug_switch">调试开关</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="checkbox_label">
                    <input id="ch-debug-mode-toggle" type="checkbox" />
                    <span data-i18n="label_enable_debug_log">启用详细调试日志</span>
                </label>
                <span id="ch-debug-status" style="color: #999; font-size: 12px;"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label data-i18n="label_debug_tools">调试工具</label>
            <div>
                <button id="ch-download-debug-log" class="st-chatu8-btn" disabled><span data-i18n="btn_download_debug_log">下载调试日志</span></button>
                <button id="ch-clear-debug-log" class="st-chatu8-btn danger" disabled><span data-i18n="btn_clear_debug_log">清空调试日志</span></button>
            </div>
        </div>
        <div class="st-chatu8-field-col" style="font-size: 12px; color: #888;">
            <span data-i18n="help_debug_mode">💡 调试模式记录详细的函数执行时间和分支逻辑，开关不持久化，关闭设置页面后需重新启用。</span>
        </div>
    </div>

    <!-- 错误收集器 -->
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_error_log">🚨 错误记录</h3>
        <div class="st-chatu8-field">
            <label data-i18n="label_error_stats">错误统计</label>
            <div id="ch-error-stats" style="font-size: 12px; color: #666; line-height: 1.6;">
                <span data-i18n="log_loading">加载中...</span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label data-i18n="label_error_tools">错误工具</label>
            <div>
                <button id="ch-view-errors" class="st-chatu8-btn"><span data-i18n="btn_view_errors">查看错误详情</span></button>
                <button id="ch-download-errors" class="st-chatu8-btn" disabled><span data-i18n="btn_download_errors">下载错误日志</span></button>
                <button id="ch-clear-errors" class="st-chatu8-btn danger" disabled><span data-i18n="btn_clear_errors">清空错误记录</span></button>
            </div>
        </div>
        <div class="st-chatu8-field-col" style="font-size: 12px; color: #888;">
            <span data-i18n="help_error_collector">💡 错误收集器自动记录插件运行时错误，不受普通日志清除影响，最多保存 500 条记录。</span>
        </div>
    </div>

    <!-- 普通日志 -->
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_log">日志</h3>
        <div class="st-chatu8-field">
            <label data-i18n="label_log_ops">操作</label>
            <div>
                <button id="ch-export-log" class="st-chatu8-btn"><span data-i18n="btn_export_log">导出日志</span></button>
                <button id="ch-clear-log" class="st-chatu8-btn danger"><span data-i18n="btn_clear_log">清空日志</span></button>
            </div>
        </div>
        <div class="st-chatu8-field-col">
            <label for="ch-log-textarea" data-i18n="label_log_output">日志输出</label>
            <textarea id="ch-log-textarea" class="st-chatu8-textarea" rows="15" readonly style="font-family: monospace; font-size: 12px;"></textarea>
        </div>
    </div>

    <!-- 任务管理器 -->
    <div class="st-chatu8-settings-section">
        <h3><span data-i18n="h_task_mgmt">📊 任务管理</span> <span id="ch-task-stats" class="st-chatu8-task-stats" style="display: none;"></span></h3>
        <div class="st-chatu8-field">
            <label data-i18n="label_log_ops">操作</label>
            <div>
                <button id="ch-cancel-all-tasks" class="st-chatu8-btn danger"><span data-i18n="btn_cancel_all_tasks">全部取消</span></button>
                <button id="ch-clear-completed" class="st-chatu8-btn"><span data-i18n="btn_clear_completed">清空已完成</span></button>
            </div>
        </div>
        <div class="st-chatu8-field-col">
            <label data-i18n="label_task_list">任务列表</label>
            <div id="ch-task-list" class="st-chatu8-task-list">
                <div class="st-chatu8-task-empty" data-i18n="task_empty">暂无任务</div>
            </div>
        </div>
    </div>
</div>
