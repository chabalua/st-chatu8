<div id="ch-tab-regex">
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_regex_settings">正则设置</h3>
        <div class="st-chatu8-field">
            <label for="ch-regex-profile-select" data-i18n="label_regex_config">正则配置</label>
            <div class="st-chatu8-profile-controls">
                <select id="ch-regex-profile-select" class="st-chatu8-select"></select>
                <button class="st-chatu8-icon-btn" id="ch-new-regex-profile-button" data-i18n-title="title_new" title="新建"><i class="fa-solid fa-plus"></i></button>
                <button class="st-chatu8-icon-btn" id="ch-save-regex-profile-button" data-i18n-title="title_save" title="保存"><i class="fa-solid fa-save"></i></button>
                <button class="st-chatu8-icon-btn" id="ch-save-as-regex-profile-button" data-i18n-title="title_save_as" title="另存为"><i class="fa-solid fa-floppy-disk"></i></button>
                <button class="st-chatu8-icon-btn" id="ch-import-regex-profile-button" data-i18n-title="title_import" title="导入"><i class="fa-solid fa-file-import"></i></button>
                <button class="st-chatu8-icon-btn" id="ch-export-regex-profile-button" data-i18n-title="title_export" title="导出"><i class="fa-solid fa-file-export"></i></button>
                <button class="st-chatu8-icon-btn danger" id="ch-delete-regex-profile-button" data-i18n-title="title_delete" title="删除"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
        <div class="st-chatu8-field-col">
            <label for="ch-regex-before-after-editor" data-i18n="label_regex_before_after">前后正则 (用于切掉前后文)</label>
            <textarea id="ch-regex-before-after-editor" class="st-chatu8-textarea" rows="3" data-i18n-placeholder="placeholder_regex_input" placeholder="输入正则表达式..."></textarea>
        </div>
        <div class="st-chatu8-field-col">
            <label for="ch-regex-text-editor" data-i18n="label_regex_text">文字正则 (用于替换内容)</label>
            <textarea id="ch-regex-text-editor" class="st-chatu8-textarea" rows="5" data-i18n-placeholder="placeholder_regex_input" placeholder="输入正则表达式..."></textarea>
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h4 data-i18n="h_regex_preset_editor">正则预设编辑器</h4>
        <div class="st-chatu8-field">
            <div class="st-chatu8-profile-controls">
                <button class="st-chatu8-btn" id="ch-add-regex-entry-button" data-i18n-title="title_new" title="新建正则条目">
                    <i class="fa-solid fa-plus"></i> <span data-i18n="btn_regex_new">新建</span>
                </button>
                <button class="st-chatu8-btn" id="ch-import-regex-entry-button" data-i18n-title="title_import" title="导入正则条目">
                    <i class="fa-solid fa-file-import"></i> <span data-i18n="btn_regex_import">导入</span>
                </button>
                <button class="st-chatu8-btn" id="ch-import-regex-entry-engine-button" data-i18n-title="title_import" title="从ST正则引擎导入">
                    <i class="fa-solid fa-download"></i> <span data-i18n="btn_regex_import_st">从ST引擎导入</span>
                </button>
            </div>
        </div>
        <div id="ch-regex-entries-container" class="st-chatu8-preset-entries-container">
            <!-- 正则条目将在这里动态渲染 -->
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h4 data-i18n="h_gesture_record">手势录制</h4>
        <div class="st-chatu8-field">
            <label for="ch-gesture-enabled" data-i18n="label_gesture_enabled">手势功能开关</label>
            <div class="st-chatu8-toggle">
                <input id="ch-gesture-enabled" type="checkbox" />
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="ch-click-trigger-enabled" data-i18n="label_click_trigger">点击触发开关</label>
            <div class="st-chatu8-toggle">
                <input id="ch-click-trigger-enabled" type="checkbox" />
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="ch-gesture-1-button" data-i18n="label_gesture_1">手势一</label>
            <button class="st-chatu8-btn" id="ch-gesture-1-button"><span data-i18n="btn_gesture_1_record">录制手势一</span></button>
        </div>
        <div class="st-chatu8-field">
            <label for="ch-gesture-2-button" data-i18n="label_gesture_2">手势二</label>
            <button class="st-chatu8-btn" id="ch-gesture-2-button"><span data-i18n="btn_gesture_2_record">录制手势二</span></button>
        </div>
        <div class="st-chatu8-field">
            <label for="ch-image-gen-demand-enabled" data-i18n="label_image_gen_demand">生图需求弹窗</label>
            <div class="st-chatu8-toggle">
                <input id="ch-image-gen-demand-enabled" type="checkbox" />
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field-col">
            <label for="ch-default-char-demand" data-i18n="label_default_char_demand">生成角色默认用户需求</label>
            <textarea id="ch-default-char-demand" class="st-chatu8-textarea" rows="2" data-i18n-placeholder="placeholder_default_demand" placeholder="当用户需求为空时使用此默认值..."></textarea>
        </div>
        <div class="st-chatu8-field-col">
            <label for="ch-default-image-demand" data-i18n="label_default_image_demand">生成图片默认用户需求</label>
            <textarea id="ch-default-image-demand" class="st-chatu8-textarea" rows="2" data-i18n-placeholder="placeholder_default_demand" placeholder="当用户需求为空时使用此默认值..."></textarea>
        </div>
        <div class="st-chatu8-field">
            <label for="ch-gesture-show-recognition" data-i18n="label_gesture_show_recognition">识别展示</label>
            <div class="st-chatu8-toggle">
                <input id="ch-gesture-show-recognition" type="checkbox" />
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="ch-gesture-show-trail" data-i18n="label_gesture_show_trail">笔迹展示</label>
            <div class="st-chatu8-toggle">
                <input id="ch-gesture-show-trail" type="checkbox" />
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="ch-gesture-trail-color" data-i18n="label_gesture_trail_color">笔迹颜色</label>
            <input type="color" id="ch-gesture-trail-color" class="st-chatu8-input">
        </div>
        <div class="st-chatu8-field">
            <label for="ch-gesture-match-threshold" data-i18n="label_gesture_threshold">匹配阈值</label>
            <input type="range" id="ch-gesture-match-threshold" class="st-chatu8-slider-input" min="0" max="100" step="1">
            <span id="ch-gesture-match-threshold-value" class="st-chatu8-slider-value"></span>
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h4 data-i18n="h_regex_test_tools">测试工具</h4>
        <div class="st-chatu8-field">
            <label for="ch-regex-test-mode" data-i18n="label_regex_test_mode">测试模式</label>
            <div class="st-chatu8-toggle">
                <input id="ch-regex-test-mode" type="checkbox" />
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field-col">
            <label for="ch-regex-test-original-text" data-i18n="label_regex_test_original">原文</label>
            <textarea id="ch-regex-test-original-text" class="st-chatu8-textarea" rows="6"></textarea>
        </div>
        <div style="text-align: center; margin: 10px 0;">
            <button class="st-chatu8-btn" id="ch-test-regex-button">
                <i class="fa-solid fa-arrow-down"></i>
                <span data-i18n="btn_test_regex">应用正则并测试</span>
                <i class="fa-solid fa-arrow-down"></i>
            </button>
        </div>
        <div class="st-chatu8-field-col">
            <label for="ch-regex-test-result-text" data-i18n="label_regex_test_result">正则后文本</label>
            <textarea id="ch-regex-test-result-text" class="st-chatu8-textarea" rows="6" readonly></textarea>
        </div>
    </div>
</div>
