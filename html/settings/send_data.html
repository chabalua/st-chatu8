<div class="st-chatu8-settings-section">
    <div class="st-chatu8-flex-container">
        <!-- 左侧：世界书 -->
        <div class="st-chatu8-worldbook-container">
            <div class="st-chatu8-list-header">
                <h3 data-i18n="h_worldbook">📚 世界书</h3>
                <div class="st-chatu8-field">
                    <input type="text" id="ch-send-data-world-search" class="st-chatu8-text-input" data-i18n-placeholder="placeholder_world_search" placeholder="搜索...">
                </div>
                <div class="st-chatu8-batch-buttons" style="display: flex; gap: 8px; margin-top: 8px;">
                    <button id="ch-send-data-refresh-worlds" class="st-chatu8-batch-button" style="flex: 1;"><i class="fa fa-refresh"></i> <span data-i18n="btn_refresh_worlds">刷新世界书</span></button>
                    <button id="ch-send-data-test-trigger" class="st-chatu8-batch-button" style="flex: 1; background: rgba(76, 175, 80, 0.2); border-color: rgba(76, 175, 80, 0.4);"><i class="fa fa-flask"></i> <span data-i18n="btn_test_trigger">测试触发</span></button>
                </div>
            </div>
            <div id="ch-send-data-world-list" class="st-chatu8-scroll-list">
                <!-- JS 会填充这里 -->
            </div>
        </div>

        <!-- 右侧：条目 -->
        <div class="st-chatu8-entry-container">
            <div class="st-chatu8-list-header">
                <h3 data-i18n="h_entry_switch">📝 条目开关</h3>
                <div class="st-chatu8-field">
                    <input type="text" id="ch-send-data-entry-search" class="st-chatu8-text-input" data-i18n-placeholder="placeholder_world_search" placeholder="搜索...">
                </div>
                <div class="st-chatu8-batch-buttons" style="display: flex; gap: 8px; margin-top: 8px;">
                    <button id="ch-send-data-select-all" class="st-chatu8-batch-button" style="flex: 1;"><span data-i18n="btn_select_all_entries">全选</span></button>
                    <button id="ch-send-data-deselect-all" class="st-chatu8-batch-button" style="flex: 1;"><span data-i18n="btn_deselect_all_entries">取消全选</span></button>
                </div>
                <div id="ch-send-data-new-entry-buttons" class="st-chatu8-new-entry-buttons" style="display: none; gap: 8px; margin-top: 8px;">
                    <button id="ch-send-data-enable-new-entries" class="st-chatu8-new-entry-btn" style="flex: 1;"><span data-i18n="btn_enable_new_entries">启用所有新条目</span></button>
                    <button id="ch-send-data-disable-new-entries" class="st-chatu8-new-entry-btn" style="flex: 1;"><span data-i18n="btn_disable_new_entries">禁用所有新条目</span></button>
                </div>
            </div>
            <div id="ch-send-data-entry-list" class="st-chatu8-scroll-list">
                <!-- JS 会填充这里 -->
            </div>
        </div>
    </div>
</div>
