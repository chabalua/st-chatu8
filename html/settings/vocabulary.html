<div id="ch-tab-vocabulary">
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_vocabulary_mgmt">词库管理</h3>
        <div class="st-chatu8-field">
            <label data-i18n="label_batch_ops">批量操作</label>
            <div>
                <button id="vocabulary-install-all-btn" class="st-chatu8-btn"><span data-i18n="btn_install_all">安装全部</span></button>
                <button id="vocabulary-uninstall-all-btn" class="st-chatu8-btn danger"><span data-i18n="btn_uninstall_all">卸载全部</span></button>
            </div>
        </div>
        <div class="st-chatu8-field-col">
            <label data-i18n="label_available_vocab">可用词库(手机安装三四个就够了)</label>
            <div id="vocabulary-file-list" class="st-chatu8-vocabulary-list"></div>
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_tag_browser">标签浏览器</h3>
        <div class="st-chatu8-field-col">
            <textarea id="vocabulary-selected-tags" class="st-chatu8-textarea" rows="3" data-i18n-placeholder="placeholder_vocab_selected_tags" placeholder="点击下方的标签将会添加到这里..."></textarea>
            <div class="st-chatu8-tag-browser-actions">
                <button id="vocabulary-tag-backspace" class="st-chatu8-btn"><span data-i18n="btn_tag_backspace">回退</span></button>
                <button id="vocabulary-tag-clear" class="st-chatu8-btn danger"><span data-i18n="btn_tag_clear">清空</span></button>
                <button id="vocabulary-tag-copy" class="st-chatu8-btn"><span data-i18n="btn_tag_copy">复制</span></button>
            </div>
        </div>
        <div id="vocabulary-tree-container" class="st-chatu8-tree-container"></div>
    </div>
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_manual_tag_mgmt">手动标签管理</h3>
        <div class="st-chatu8-field-col" style="gap: 10px;">
            <label data-i18n="label_add_new_tag">添加新标签</label>
            <div class="st-chatu8-input-group">
                <input type="text" id="vocabulary-manual-tag-original-input" class="st-chatu8-text-input" data-i18n-placeholder="placeholder_tag_original" placeholder="标签原文...">
                <input type="text" id="vocabulary-manual-tag-translation-input" class="st-chatu8-text-input" data-i18n-placeholder="placeholder_tag_translation" placeholder="标签翻译...">
                <button id="vocabulary-manual-tag-add-btn" class="st-chatu8-btn"><span data-i18n="btn_tag_add">添加</span></button>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label data-i18n="label_tag_ops">操作</label>
            <button id="vocabulary-manual-tags-refresh-btn" class="st-chatu8-btn"><span data-i18n="btn_tag_refresh">刷新列表</span></button>
        </div>
        <div class="st-chatu8-field-col">
            <label data-i18n="label_manual_tags">手动添加的标签</label>
            <div id="vocabulary-manual-tags-list" class="st-chatu8-vocabulary-list" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_search_settings">搜索设置</h3>
        <div class="st-chatu8-field">
            <label for="vocabulary_search_startswith" data-i18n="label_search_startswith">开头匹配</label>
            <div class="st-chatu8-toggle">
                <input id="vocabulary_search_startswith" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="vocabulary_search_limit" data-i18n="label_search_limit">最大结果数</label>
            <input type="number" id="vocabulary_search_limit" class="st-chatu8-text-input" min="1" max="1000">
        </div>
        <div class="st-chatu8-field">
            <label for="vocabulary_search_sort" data-i18n="label_search_sort">排序方式</label>
            <select id="vocabulary_search_sort" class="st-chatu8-select">
                <option value="hot_asc" data-i18n="sort_hot_asc">按热度升序</option>
                <option value="hot_desc" data-i18n="sort_hot_desc">按热度降序</option>
                <option value="key_asc" data-i18n="sort_key_asc">按英文名升序</option>
            </select>
        </div>
    </div>
    <div class="st-chatu8-settings-section">
        <h3 data-i18n="h_vocab_test">测试</h3>
        <div class="st-chatu8-field">
            <label for="vocabulary-search-input" data-i18n="label_vocab_search">搜索</label>
            <div class="st-chatu8-input-group">
                <input type="text" id="vocabulary-search-input" class="st-chatu8-text-input" data-i18n-placeholder="placeholder_vocab_search" placeholder="输入关键词...">
                <button id="vocabulary-search-btn" class="st-chatu8-btn"><span data-i18n="btn_vocab_search">搜索</span></button>
            </div>
        </div>
        <div class="st-chatu8-field-col">
            <label data-i18n="label_search_results">搜索结果</label>
            <div id="vocabulary-search-results" class="st-chatu8-textarea" style="height: 150px; overflow-y: auto;"></div>
        </div>
    </div>
</div>
